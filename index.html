<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>

    <!-- CSS files -->
     <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="./styles/standard.css">
     <link rel="stylesheet" href="./styles/fonts.css">
     <link rel="stylesheet" href="./styles/assets.css">
     <link rel="stylesheet" href="./styles/basket.css">
</head>
<body>
    <header>
        <section class="header-section">
            <img src="./assets/img/header-logo.png" alt="Logo picture">
            <img src="./assets/img/menu-button.png" alt="Menu button">
        </section>
    </header>
    <main>
        <section>
            <div class="hero-container">
                <img src="./assets/img/restaurant-picture.png" alt="Restaurant picture" class="hero-background">
                <img src="./assets/img/restaurant-name-Logo.png" alt="Restaurant logo" class="hero-foreground">
            </div>
            <div class="restaurant-name">
                <h1><span>Timo's</span> Restaurant</h1>
                <p>⭐ 4,3 (300)</p>
            </div>
            <div class="restaurant-description">
                <p>Das Beste aus Burgern, Pizza und Salat – alles an einem Ort.</p>
            </div>

        </section>



    </main>




    <footer>
        <section class="footer-section">
            <p>(c) 2026 Timo</p>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
        </section>
    </footer>
    
    <!-- JavaScript files -->
     <script src="./scripts/database.js"></script>
     <script src="./scripts/template.js"></script>
     <script src="./script.js"></script>
</body>
</html>
